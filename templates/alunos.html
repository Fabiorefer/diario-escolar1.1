<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alunos</title>

<style>

*{
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2c7be5, #6a11cb);
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CAIXA */
.box{
    background:white;
    width:90%;
    max-width:450px;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

/* TÍTULOS */
h2{
    margin-bottom:15px;
    color:#333;
}

h3{
    margin-top:20px;
    color:#555;
}

/* INPUTS */
input, select{
    width:100%;
    padding:10px;
    font-size:14px;
    margin-top:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

/* BOTÕES */
button{
    width:100%;
    padding:10px;
    margin-top:12px;
    font-size:14px;
    border:none;
    border-radius:6px;
    background:#2c7be5;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1a5ed8;
}

/* VOLTAR */
.voltar{
    background:#6c757d;
}

.voltar:hover{
    background:#545b62;
}

/* LISTA */
.lista{
    margin-top:10px;
}

/* CARD ALUNO */
.item{
    background:#f1f1f1;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    text-align:left;
    font-size:14px;
}

/* RESPONSIVO */
@media (max-width:400px){

    .box{
        padding:20px;
    }

    h2{
        font-size:20px;
    }

    button{
        font-size:13px;
    }

}

</style>

</head>

<body>

<div class="box">

<h2>Alunos</h2>

<form method="POST">

<select name="disciplina" required>
<option value="">Disciplina</option>
{% for d in disciplinas %}
<option value="{{ d }}">{{ d }}</option>
{% endfor %}
</select>

<select name="turma" required>
<option value="">Turma</option>
{% for t in turmas %}
<option value="{{ t }}">{{ t }}</option>
{% endfor %}
</select>

<input name="aluno" placeholder="Nome do aluno" required>

<button type="submit">Adicionar Aluno</button>

</form>

<hr>

<h3>Alunos cadastrados</h3>

<div class="lista">

{% for d,t,a in alunos %}
<div class="item">
<b>{{ a }}</b><br>
{{ d }} - {{ t }}
</div>
{% endfor %}

</div>

<br>

<a href="/menu">
<button class="voltar">Voltar</button>
</a>

</div>

</body>
</html>
