<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - Diário de Classe</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
margin-top:60px;
}

.box{
background:white;
width:300px;
margin:auto;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:8px;
margin:5px;
}

button{
padding:8px;
margin:5px;
width:95%;
}
</style>

</head>

<body>

<div class="box">

<h2>Diário de Classe</h2>

{% if erro %}
<p style="color:red">{{ erro }}</p>
{% endif %}

<form method="POST">

<input name="usuario" placeholder="Usuário">

<input name="senha" type="password" placeholder="Senha">

<button type="submit">Entrar</button>

</form>

<a href="/criar">
<button>Criar Usuário</button>
</a>

</div>

</body>
</html>
