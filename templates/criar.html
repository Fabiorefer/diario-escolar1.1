<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Usuário</title>

<style>

*{
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2c7be5, #6a11cb);
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CAIXA */
.box{
    background:white;
    width:90%;
    max-width:350px;
    padding:25px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

/* TÍTULO */
h2{
    margin-bottom:20px;
    color:#333;
}

/* INPUTS */
input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:5px;
    border:1px solid #ccc;
    font-size:14px;
}

/* BOTÕES */
button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    background:#2c7be5;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1a5ed8;
}

/* BOTÃO VOLTAR */
.btn-voltar{
    background:#6c757d;
}

.btn-voltar:hover{
    background:#545b62;
}

/* RESPONSIVO EXTRA */
@media (max-width:400px){

    .box{
        padding:20px;
    }

    h2{
        font-size:20px;
    }

}

</style>

</head>

<body>

<div class="box">

<h2>Criar Conta</h2>

<form method="POST">

<input name="usuario" placeholder="Usuário" required>

<input name="senha" type="password" placeholder="Senha" required>

<button type="submit">Cadastrar</button>

</form>

<a href="/">
<button class="btn-voltar">Voltar</button>
</a>

</div>

</body>
</html>
