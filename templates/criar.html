<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Criar Usuário</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
margin-top:60px;
}

.box{
background:white;
width:300px;
margin:auto;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:8px;
margin:5px;
}

button{
padding:8px;
margin:5px;
width:95%;
}
</style>
</head>

<body>

<div class="box">

<h2>Criar Conta</h2>

<form method="POST">

<input name="usuario" placeholder="Usuário" required>

<input name="senha" type="password" placeholder="Senha" required>

<button type="submit">Cadastrar</button>

</form>

<a href="/">
<button>Voltar</button>
</a>

</div>

</body>
</html>
