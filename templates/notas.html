<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lançamento de Notas</title>

<style>

*{
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2c7be5, #6a11cb);
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CAIXA */
.box{
    background:white;
    width:95%;
    max-width:1100px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TÍTULO */
h2{
    text-align:center;
}

/* TOPO */
.topo{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

/* INPUTS */
select{
    padding:8px;
    border-radius:5px;
    border:1px solid #ccc;
}

/* BOTÕES */
button{
    padding:10px;
    border:none;
    border-radius:6px;
    background:#2c7be5;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1a5ed8;
}

/* VOLTAR */
.voltar{
    background:#6c757d;
}

.voltar:hover{
    background:#545b62;
}

/* MSG */
.msg{
    background:#d4edda;
    padding:10px;
    margin-bottom:10px;
    border-radius:5px;
    text-align:center;
}

/* TABELA */
.table-container{
    overflow-x:auto;
    margin-top:10px;
}

table{
    border-collapse: collapse;
    width:100%;
    min-width:700px;
}

td,th{
    border:1px solid #ccc;
    padding:6px;
    text-align:center;
}

th{
    background:#f1f1f1;
}

/* INPUT NOTA */
input{
    width:60px;
    padding:5px;
}

/* MÉDIA */
.media{
    font-weight:bold;
    background:#f8f9fa;
}

/* BOTÃO SALVAR */
.btn-salvar{
    width:100%;
    margin-top:10px;
}

/* RESPONSIVO */
@media (max-width:600px){

    .topo{
        flex-direction:column;
    }

    select, button{
        width:100%;
    }

    input{
        width:50px;
    }

}

</style>

<script>

function calcularMedia(input){

let linha = input.id.split("_")[1]

let p1 = parseFloat(document.getElementById("p1_"+linha).value) || 0
let p2 = parseFloat(document.getElementById("p2_"+linha).value) || 0
let trab = parseFloat(document.getElementById("trab_"+linha).value) || 0
let part = parseFloat(document.getElementById("part_"+linha).value) || 0
let tarefa = parseFloat(document.getElementById("tarefa_"+linha).value) || 0

let media =
(p1 * 0.3) +
(p2 * 0.3) +
(trab * 0.1333) +
(part * 0.1333) +
(tarefa * 0.1333)

document.getElementById("media_"+linha).innerHTML = media.toFixed(1)

}

// calcula todas ao carregar
window.onload = function(){
    let linhas = document.querySelectorAll("[id^='media_']")
    linhas.forEach((el) => {
        let linha = el.id.split("_")[1]
        let input = document.getElementById("p1_"+linha)
        if(input){
            calcularMedia(input)
        }
    })
}

</script>

</head>

<body>

<div class="box">

<h2>Lançamento de Notas</h2>

{% if salvo %}
<div class="msg">
Notas salvas com sucesso
</div>
{% endif %}

<form method="GET" class="topo">

<select name="disciplina" onchange="this.form.submit()">
<option value="">Disciplina</option>
{% for d in disciplinas %}
<option value="{{ d }}" {% if disciplina==d %}selected{% endif %}>
{{ d }}
</option>
{% endfor %}
</select>

<select name="turma" onchange="this.form.submit()">
<option value="">Turma</option>
{% for t in turmas %}
<option value="{{ t }}" {% if turma==t %}selected{% endif %}>
{{ t }}
</option>
{% endfor %}
</select>

<select name="bimestre">
<option value="">Bimestre</option>
<option value="1" {% if bimestre=="1" %}selected{% endif %}>1º</option>
<option value="2" {% if bimestre=="2" %}selected{% endif %}>2º</option>
<option value="3" {% if bimestre=="3" %}selected{% endif %}>3º</option>
<option value="4" {% if bimestre=="4" %}selected{% endif %}>4º</option>
</select>

<button type="submit">Carregar</button>

</form>

{% if alunos %}

<form method="POST">

<input type="hidden" name="disciplina" value="{{ disciplina }}">
<input type="hidden" name="turma" value="{{ turma }}">
<input type="hidden" name="bimestre" value="{{ bimestre }}">

<div class="table-container">

<table>

<tr>
<th>Aluno</th>
<th>P1</th>
<th>P2</th>
<th>Trab</th>
<th>Part</th>
<th>Tarefa</th>
<th>Média</th>
</tr>

{% for aluno in alunos %}

<tr>

<td style="text-align:left">{{ aluno }}</td>

<td><input type="number" step="0.1" min="0" max="10"
id="p1_{{loop.index}}"
name="p1_{{loop.index}}"
value="{{ notas[aluno]['p1'] if aluno in notas else '' }}"
oninput="calcularMedia(this)"></td>

<td><input type="number" step="0.1" min="0" max="10"
id="p2_{{loop.index}}"
name="p2_{{loop.index}}"
value="{{ notas[aluno]['p2'] if aluno in notas else '' }}"
oninput="calcularMedia(this)"></td>

<td><input type="number" step="0.1" min="0" max="10"
id="trab_{{loop.index}}"
name="trab_{{loop.index}}"
value="{{ notas[aluno]['trab'] if aluno in notas else '' }}"
oninput="calcularMedia(this)"></td>

<td><input type="number" step="0.1" min="0" max="10"
id="part_{{loop.index}}"
name="part_{{loop.index}}"
value="{{ notas[aluno]['part'] if aluno in notas else '' }}"
oninput="calcularMedia(this)"></td>

<td><input type="number" step="0.1" min="0" max="10"
id="tarefa_{{loop.index}}"
name="tarefa_{{loop.index}}"
value="{{ notas[aluno]['tarefa'] if aluno in notas else '' }}"
oninput="calcularMedia(this)"></td>

<td class="media" id="media_{{loop.index}}">
-
</td>

</tr>

{% endfor %}

</table>

</div>

<button type="submit" class="btn-salvar">Salvar Notas</button>

</form>

{% endif %}

<br>

<a href="/menu">
<button class="voltar">Voltar</button>
</a>

</div>

</body>
</html>
