<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Relatório</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
margin:0;
}

.box{
background:white;
width:500px;
margin:auto;
margin-top:40px;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

select,button{
padding:8px;
margin:5px;
width:250px;
}

button{
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1a5ed8;
}

.voltar{
background:#6c757d;
}

.voltar:hover{
background:#545b62;
}
</style>

</head>
<body>

<div class="box">

<h2>Relatório</h2>

<form action="/relatorio_pdf" method="get">

Disciplina<br> <select name="disciplina" required>

<option value="">Selecione</option>
{% for d in disciplinas %}
<option value="{{ d }}" 
{% if request.args.get('disciplina') == d %}selected{% endif %}>
{{ d }}
</option>
{% endfor %}
</select>

<br>

Turma<br> <select name="turma" required>

<option value="">Selecione</option>
{% for t in turmas %}
<option value="{{ t }}"
{% if request.args.get('turma') == t %}selected{% endif %}>
{{ t }}
</option>
{% endfor %}
</select>

<br>

Bimestre<br> <select name="bimestre" required>

<option value="">Selecione</option>
<option value="1" {% if request.args.get('bimestre') == "1" %}selected{% endif %}>1º Bimestre</option>
<option value="2" {% if request.args.get('bimestre') == "2" %}selected{% endif %}>2º Bimestre</option>
<option value="3" {% if request.args.get('bimestre') == "3" %}selected{% endif %}>3º Bimestre</option>
<option value="4" {% if request.args.get('bimestre') == "4" %}selected{% endif %}>4º Bimestre</option>
</select>

<br><br>

<button type="submit">Gerar Relatório PDF</button>

</form>

<br>

<a href="/menu">
<button class="voltar">Voltar</button>
</a>

</div>

</body>
</html>
