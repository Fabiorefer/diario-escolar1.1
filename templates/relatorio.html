<form action="/relatorio_pdf" method="get">

<div class="grupo">
<label>Disciplina</label>
<select name="disciplina" required onchange="this.form.submit()">
<option value="">Selecione</option>
{% for d in disciplinas %}
<option value="{{ d }}">{{ d }}</option>
{% endfor %}
</select>
</div>

<div class="grupo">
<label>Turma</label>
<select name="turma" required onchange="this.form.submit()">
<option value="">Selecione</option>
{% for t in turmas %}
<option value="{{ t }}">{{ t }}</option>
{% endfor %}
</select>
</div>

<div class="grupo">
<label>Bimestre</label>
<select name="bimestre" required>
<option value="">Selecione</option>
<option value="1">1º</option>
<option value="2">2º</option>
<option value="3">3º</option>
<option value="4">4º</option>
</select>
</div>

<div class="grupo">
<label>Aluno (opcional)</label>
<select name="aluno">
<option value="">Todos</option>
{% for a in alunos %}
<option value="{{ a }}">{{ a }}</option>
{% endfor %}
</select>
</div>

<button type="submit" class="btn-gerar">Gerar Relatório PDF</button>

</form>
