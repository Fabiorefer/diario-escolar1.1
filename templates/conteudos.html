<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Conteúdos</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
margin:0;
}

.box{
background:white;
width:800px;
margin:auto;
margin-top:30px;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

table{
border-collapse: collapse;
width:100%;
margin-top:10px;
}

td,th{
border:1px solid #ccc;
padding:6px;
text-align:left;
}

th{
background:#f1f1f1;
text-align:center;
}

select,input{
padding:6px;
margin:3px;
}

textarea{
width:100%;
padding:10px;
font-family: Arial;
}

button{
padding:8px 15px;
margin-top:10px;
border:none;
background:#2c7be5;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1a5ed8;
}

.voltar{
background:#6c757d;
}

.voltar:hover{
background:#545b62;
}

.msg{
background:#d4edda;
padding:10px;
margin-bottom:10px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="box">

<h2>Registro de Conteúdos</h2>

{% if salvo %}

<div class="msg">
Conteúdo salvo com sucesso
</div>
{% endif %}

<form method="GET">

Disciplina <select name="disciplina" onchange="this.form.submit()">

<option value="">Selecione</option>

{% for d in disciplinas %}

<option value="{{ d }}" {% if disciplina==d %}selected{% endif %}>
{{ d }}
</option>
{% endfor %}
</select>

Turma <select name="turma" onchange="this.form.submit()">

<option value="">Selecione</option>

{% for t in turmas %}

<option value="{{ t }}" {% if turma==t %}selected{% endif %}>
{{ t }}
</option>
{% endfor %}
</select>

Data <input type="date" name="data" value="{{ data }}">

<button type="submit">Carregar</button>

</form>

<br>

{% if disciplina and turma and data %}

<form method="POST">

<input type="hidden" name="disciplina" value="{{ disciplina }}">
<input type="hidden" name="turma" value="{{ turma }}">
<input type="hidden" name="data" value="{{ data }}">

<b>Conteúdo da Aula</b>

<br><br>

<textarea name="conteudo" rows="5">{{ conteudo_atual }}</textarea>

<br>

<button type="submit">Salvar Conteúdo</button>

</form>

{% endif %}

<hr>

<h3>Conteúdos já lançados</h3>

<table>

<tr>
<th>Data</th>
<th>Conteúdo</th>
</tr>

{% for item in conteudos %}

<tr>
<td style="width:120px">{{ item.data }}</td>
<td>{{ item.conteudo }}</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/menu">
<button class="voltar">Voltar</button>
</a>

</div>

</body>
</html>
