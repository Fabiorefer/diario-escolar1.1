<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conteúdos</title>

<style>

*{
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2c7be5, #6a11cb);
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CAIXA */
.box{
    background:white;
    width:95%;
    max-width:900px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TÍTULO */
h2{
    text-align:center;
}

/* TOPO */
.topo{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

/* INPUTS */
select, input{
    padding:8px;
    border-radius:5px;
    border:1px solid #ccc;
}

/* TEXTAREA */
textarea{
    width:100%;
    padding:10px;
    border-radius:5px;
    border:1px solid #ccc;
    font-family: Arial;
}

/* BOTÕES */
button{
    padding:10px;
    border:none;
    border-radius:6px;
    background:#2c7be5;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1a5ed8;
}

/* VOLTAR */
.voltar{
    background:#6c757d;
}

.voltar:hover{
    background:#545b62;
}

/* MSG */
.msg{
    background:#d4edda;
    padding:10px;
    margin-bottom:10px;
    border-radius:5px;
    text-align:center;
}

/* TABELA */
.table-container{
    overflow-x:auto;
    margin-top:10px;
}

table{
    border-collapse: collapse;
    width:100%;
    min-width:500px;
}

td,th{
    border:1px solid #ccc;
    padding:6px;
    text-align:left;
}

th{
    background:#f1f1f1;
    text-align:center;
}

/* BOTÃO SALVAR */
.btn-salvar{
    width:100%;
    margin-top:10px;
}

/* RESPONSIVO */
@media (max-width:600px){

    .topo{
        flex-direction:column;
    }

    select, input, button{
        width:100%;
    }

}

</style>

</head>

<body>

<div class="box">

<h2>Registro de Conteúdos</h2>

{% if salvo %}
<div class="msg">
Conteúdo salvo com sucesso
</div>
{% endif %}

<form method="GET" class="topo">

<select name="disciplina" onchange="this.form.submit()">
<option value="">Disciplina</option>
{% for d in disciplinas %}
<option value="{{ d }}" {% if disciplina==d %}selected{% endif %}>
{{ d }}
</option>
{% endfor %}
</select>

<select name="turma" onchange="this.form.submit()">
<option value="">Turma</option>
{% for t in turmas %}
<option value="{{ t }}" {% if turma==t %}selected{% endif %}>
{{ t }}
</option>
{% endfor %}
</select>

<input type="date" name="data" value="{{ data }}">

<button type="submit">Carregar</button>

</form>

{% if disciplina and turma and data %}

<form method="POST">

<input type="hidden" name="disciplina" value="{{ disciplina }}">
<input type="hidden" name="turma" value="{{ turma }}">
<input type="hidden" name="data" value="{{ data }}">

<br>

<b>Conteúdo da Aula</b>

<textarea name="conteudo" rows="5">{{ conteudo_atual }}</textarea>

<button type="submit" class="btn-salvar">Salvar Conteúdo</button>

</form>

{% endif %}

<hr>

<h3 style="text-align:center">Conteúdos já lançados</h3>

<div class="table-container">

<table>

<tr>
<th>Data</th>
<th>Conteúdo</th>
</tr>

{% for item in conteudos %}
<tr>
<td style="width:120px">{{ item.data }}</td>
<td>{{ item.conteudo }}</td>
</tr>
{% endfor %}

</table>

</div>

<br>

<a href="/menu">
<button class="voltar">Voltar</button>
</a>

</div>

</body>
</html>
