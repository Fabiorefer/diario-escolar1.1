<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presença</title>

<style>

*{
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2c7be5, #6a11cb);
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CAIXA */
.box{
    background:white;
    width:95%;
    max-width:900px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TÍTULO */
h2{
    text-align:center;
    margin-bottom:15px;
}

/* FORM TOPO */
.topo{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

/* INPUTS */
select, input{
    padding:8px;
    border-radius:5px;
    border:1px solid #ccc;
    min-width:120px;
}

/* BOTÕES */
button{
    padding:10px;
    border:none;
    border-radius:6px;
    background:#2c7be5;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1a5ed8;
}

/* VOLTAR */
.voltar{
    background:#6c757d;
}

.voltar:hover{
    background:#545b62;
}

/* MENSAGEM */
.msg{
    background:#d4edda;
    padding:10px;
    margin-bottom:10px;
    border-radius:5px;
    text-align:center;
}

/* TABELA */
.table-container{
    overflow-x:auto;
    margin-top:10px;
}

table{
    border-collapse: collapse;
    width:100%;
    min-width:500px;
}

td,th{
    border:1px solid #ccc;
    padding:6px;
    text-align:center;
}

th{
    background:#f1f1f1;
}

/* BOTÃO SALVAR */
.btn-salvar{
    width:100%;
    margin-top:10px;
}

/* RESPONSIVO */
@media (max-width:600px){

    .topo{
        flex-direction:column;
    }

    select, input{
        width:100%;
    }

    button{
        width:100%;
    }

}

</style>

</head>

<body>

<div class="box">

<h2>Controle de Presença</h2>

{% if salvo %}
<div class="msg">
Presença salva com sucesso
</div>
{% endif %}

<form method="GET" class="topo">

<select name="disciplina" required>
<option value="">Disciplina</option>
{% for d in disciplinas %}
<option value="{{ d }}" {% if disciplina == d %}selected{% endif %}>
{{ d }}
</option>
{% endfor %}
</select>

<select name="turma" required>
<option value="">Turma</option>
{% for t in turmas %}
<option value="{{ t }}" {% if turma == t %}selected{% endif %}>
{{ t }}
</option>
{% endfor %}
</select>

<input type="date" name="data" value="{{ data }}" required>

<button type="submit">Carregar</button>

</form>

{% if alunos %}

<form method="POST">

<input type="hidden" name="disciplina" value="{{ disciplina }}">
<input type="hidden" name="turma" value="{{ turma }}">
<input type="hidden" name="data" value="{{ data }}">

<div class="table-container">

<table>

<tr>
<th style="text-align:left">Aluno</th>
<th>Presente</th>
<th>Falta</th>
</tr>

{% for aluno in alunos %}
<tr>

<td style="text-align:left">{{ aluno }}</td>

<td>
<input 
type="radio"
name="presenca_{{ loop.index }}"
value="P"
required
{% if presencas and presencas.get(aluno) == "P" %}checked{% endif %}
>
</td>

<td>
<input 
type="radio"
name="presenca_{{ loop.index }}"
value="F"
required
{% if presencas and presencas.get(aluno) == "F" %}checked{% endif %}
>
</td>

<input type="hidden" name="aluno_{{ loop.index }}" value="{{ aluno }}">

</tr>
{% endfor %}

</table>

</div>

<button type="submit" class="btn-salvar">Salvar Presença</button>

</form>

{% endif %}

<br>

<a href="/menu">
<button class="voltar">Voltar</button>
</a>

</div>

</body>
</html>
